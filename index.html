<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --accent: #b82222; --bg: #0f0f0f; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Start Screen */
        #home-screen { text-align: center; }
        .btn-scan { background: var(--accent); color: black; border: none; padding: 20px 50px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        
        /* Scanner Screen */
        #scanner-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: relative; }
        #video-wrap { position: relative; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* CARD SHAPED VIEW FINDER */
        #viewfinder { 
            position: absolute; 
            width: 260px; /* Card Width */
            height: 380px; /* Card Height */
            border: 3px solid var(--accent); 
            border-radius: 15px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.6); /* Dims everything outside the card shape */
            z-index: 10;
        }

        #status { 
            position: absolute; bottom: 10%; width: 100%; text-align: center; 
            z-index: 20; font-family: monospace; color: var(--accent); font-weight: bold;
        }

        .success-flash { animation: flash 0.5s; }
        @keyframes flash { from { background: var(--accent); } to { background: transparent; } }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>PROJECT: CARDS</h1>
        <button class="btn-scan" onclick="startScanning()">START SCANNER</button>
    </div>

    <div id="scanner-screen">
        <div id="video-wrap">
            <video id="video" playsinline></video>
            <div id="viewfinder"></div>
        </div>
        <div id="status">INITIALIZING...</div>
    </div>

    <script>
        const home = document.getElementById('home-screen');
        const scanner = document.getElementById('scanner-screen');
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        // REDIRECT DATABASE
        const cardLinks = {
            "CHECKPOINT": "https://www.youtube.com/watch?v=dQw4w9WgXcQ", // Redirects to YouTube
            "STARVATION": "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
            "ALCHEMIST": "https://www.youtube.com/results?search_query=alchemist+card"
        };

        let worker;

        async function startScanning() {
            home.style.display = 'none';
            scanner.style.display = 'flex';
            
            status.innerText = "LOADING ENGINE...";
            worker = await Tesseract.createWorker('eng');
            
            // Start Camera
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    status.innerText = "CENTER THE CARD IN THE FRAME";
                    scanLoop();
                });
        }

        async function scanLoop() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            
            // We set the canvas to match our card-shaped viewfinder
            canvas.width = 300;
            canvas.height = 450;
            
            // Capture the area inside the card-shaped box
            // Note: Adjusting the crop area to center
            ctx.drawImage(video, video.videoWidth*0.25, video.videoHeight*0.2, video.videoWidth*0.5, video.videoHeight*0.6, 0, 0, 300, 450);

            const { data: { text } } = await worker.recognize(canvas);
            const foundText = text.toUpperCase();
            
            console.log("Saw:", foundText); // Watch this in the browser console

            for (let key in cardLinks) {
                if (foundText.includes(key)) {
                    // Visual feedback
                    document.getElementById('viewfinder').classList.add('success-flash');
                    status.innerText = "CARD IDENTIFIED! REDIRECTING...";
                    
                    setTimeout(() => {
                        window.location.href = cardLinks[key];
                    }, 800);
                    return; 
                }
            }
            
            setTimeout(scanLoop, 500);
        }
    </script>
</body>
</html>
